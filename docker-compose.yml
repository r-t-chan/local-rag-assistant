services:
  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped

  app:
    build: .
    depends_on:
      - ollama
    ports:
      - "8001:8000"
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_CHAT_MODEL=${OLLAMA_CHAT_MODEL:-llama3.1:8b-instruct-q4_K_M}
      - OLLAMA_EMBED_MODEL=${OLLAMA_EMBED_MODEL:-nomic-embed-text}
      - DB_PATH=/app/data/db/vectors.db
    volumes:
      - ./data:/app/data
    restart: unless-stopped

volumes:
  ollama_data:
