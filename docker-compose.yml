services:
  # No host port published: Ollama is only reachable from the app container over
  # the internal compose network. Nothing outside this stack can hit the model
  # server directly (it has no auth of its own).
  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    # Memory ceiling sized for one 7-8B Q4 model plus the embedding model
    # loaded concurrently, with headroom, inside a 16GB host budget. Raise
    # this if you configure a larger model.
    mem_limit: 10g
    cpus: 6
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # One-shot: guarantees data/kiwix/library.xml exists before kiwix-serve
  # starts. Without this, a fresh clone (or an existing deployment pulling
  # this feature for the first time, having never run init_env.sh again)
  # bind-mounts a *missing* host file — Docker's default behavior in that
  # case is to silently create a directory at that path instead of a file,
  # which then makes kiwix-serve fail to start at all, which in turn blocks
  # `app` forever (verified directly). Mounting the parent directory here
  # instead of the file avoids that ambiguity, and this container just
  # ensures the file inside it is real before the main service depends on it.
  kiwix-init:
    image: ghcr.io/kiwix/kiwix-serve:latest
    # Root, not the image's default uid 1001: the bind-mounted host directory
    # is owned by whatever user ran `docker compose up`, and a fixed non-root
    # uid baked into the image has no guarantee of write access to it
    # (verified directly — 1001 got a bare "Permission denied" against a
    # normal 755 host directory). This container does nothing but write one
    # small file and exit, so running that briefly as root is a reasonable
    # trade for not depending on host/image uid alignment.
    user: "0:0"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        if [ ! -f /config/library.xml ]; then
          printf '<?xml version="1.0" encoding="UTF-8" ?>\n<library version="20110515">\n</library>\n' > /config/library.xml
        fi
    volumes:
      - ./data/kiwix:/config
    restart: "no"

  # No host port published, same reasoning as Ollama: kiwix-serve has no auth
  # of its own, so only the app container should be able to reach it.
  #
  # Runs in --library mode against an XML manifest rather than a `*.zim`
  # glob: with the glob form, kiwix-serve crash-loops forever if zero ZIM
  # files are present (verified directly) — a real problem since downloading
  # Wikipedia is meant to be optional. --monitorLibrary hot-reloads the
  # manifest, so scripts/download_wikipedia_zim.sh registering a new ZIM via
  # kiwix-manage doesn't require restarting this container. The library
  # directory is mounted read-only here — this service only ever needs to
  # read it; kiwix-manage (in the download script) writes it via a separate,
  # writable mount of the same host directory.
  kiwix:
    image: ghcr.io/kiwix/kiwix-serve:latest
    command: ["--library", "--monitorLibrary", "/config/library.xml"]
    depends_on:
      kiwix-init:
        condition: service_completed_successfully
    volumes:
      - ./data/zim:/data/zim:ro
      - ./data/kiwix:/config:ro
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    mem_limit: 1g
    cpus: 2
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  app:
    build: .
    depends_on:
      ollama:
        condition: service_healthy
      # service_started, not service_healthy: Kiwix is a soft dependency (see
      # src/kiwix.py — every call degrades to [] on failure rather than
      # raising), so a Kiwix outage or slow start shouldn't block the app
      # from starting at all. Gating on service_healthy here would make the
      # "soft dependency" design a lie at the infrastructure level.
      kiwix:
        condition: service_started
    # Loopback-only by default — this is a private single-user tool, not a
    # service meant to be reachable from the LAN. Change to "8001:8000" if you
    # deliberately want LAN access (and put a reverse proxy + TLS in front of it).
    ports:
      - "127.0.0.1:8001:8000"
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_CHAT_MODEL=${OLLAMA_CHAT_MODEL:-llama3.1:8b-instruct-q4_K_M}
      - OLLAMA_EMBED_MODEL=${OLLAMA_EMBED_MODEL:-nomic-embed-text}
      - KIWIX_HOST=http://kiwix:8080
      - DB_PATH=/app/data/db/vectors.db
      - API_KEY=${API_KEY:?API_KEY is required — run ./scripts/init_env.sh first}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 512m
    cpus: 1
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  ollama_data:
