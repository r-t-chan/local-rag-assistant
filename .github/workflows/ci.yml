name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Lint (ruff)
        run: uv run ruff check src

      - name: Dependency vulnerability audit
        run: |
          uv export --no-dev --no-hashes -o requirements.lock.txt
          uvx pip-audit -r requirements.lock.txt

  container-scan:
    runs-on: ubuntu-latest
    needs: lint-and-audit
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t local-rag-assistant:ci .

      - name: Scan image for known CVEs (Trivy)
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          image-ref: local-rag-assistant:ci
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

  # Only publishes on main, and only after lint/audit/scan all pass on that
  # commit — a scanned-but-unpublished image on a PR branch is useless, and a
  # published-but-unscanned image on main would defeat the point of scanning.
  publish:
    runs-on: ubuntu-latest
    needs: container-scan
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
