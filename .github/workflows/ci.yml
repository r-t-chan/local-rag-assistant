name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Lint (ruff)
        run: uv run ruff check src

      - name: Dependency vulnerability audit
        run: |
          uv export --no-dev --no-hashes -o requirements.lock.txt
          uvx pip-audit -r requirements.lock.txt

  container-scan:
    runs-on: ubuntu-latest
    needs: lint-and-audit
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t local-rag-assistant:ci .

      - name: Scan image for known CVEs (Trivy)
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          image-ref: local-rag-assistant:ci
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
